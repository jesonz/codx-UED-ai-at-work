<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>点评UED AI实践分享会</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #E8612A;
      --orange-light: #F07A47;
      --bg: #111010;
      --bg-mid: #1a1410;
      --white: #F5F0EA;
      --gray: #888;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden; /* single screen */
    }

    body {
      background: var(--bg);
      font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif;
      color: var(--white);
      cursor: none; /* custom cursor */
    }

    /* ── CUSTOM CURSOR ─────────────────────────────────────── */
    #cursor {
      position: fixed;
      width: 14px; height: 14px;
      background: var(--orange);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width .15s, height .15s, background .15s;
      mix-blend-mode: normal;
    }
    #cursor.big {
      width: 44px; height: 44px;
      background: rgba(232,97,42,0.25);
      border: 2px solid var(--orange);
    }

    /* ── DOT GRID BACKGROUND ───────────────────────────────── */
    .dot-grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.13) 1.5px, transparent 1.5px);
      background-size: 32px 32px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
    }

    /* ── RADIAL SPOTLIGHT ──────────────────────────────────── */
    .spotlight {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(ellipse 55% 55% at 50% 38%, rgba(90,40,15,0.55) 0%, transparent 80%);
    }

    /* ── LAYOUT ────────────────────────────────────────────── */
    .page {
      position: relative;
      z-index: 1;
      width: 100%; height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow: hidden;
    }

    /* ── TOP NAV ───────────────────────────────────────────── */
    nav {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 36px;
      z-index: 10;
    }
    .nav-logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--white);
      opacity: 0.9;
    }
    .nav-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--gray);
      text-transform: uppercase;
      line-height: 1.5;
    }

    /* ── HERO TEXT ─────────────────────────────────────────── */
    .hero {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: clamp(84px, calc(9vh + 20px), 120px);
      z-index: 2;
      pointer-events: none;
    }
    .hero-sub {
      font-size: clamp(11px, 1.2vw, 14px);
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: clamp(10px, 1.5vh, 18px);
    }
    .hero-title {
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 900;
      font-size: clamp(48px, 8.5vw, 128px);
      line-height: 1.25;
      text-align: center;
      color: var(--orange);
      letter-spacing: -0.02em;
      text-shadow: 0 4px 32px rgba(232,97,42,0.25), 0 0 80px rgba(232,97,42,0.1);
      user-select: none;
    }
    .hero-title .line2 { display: block; }

    /* ── CTA BAR ───────────────────────────────────────────── */
    .cta-bar {
      position: absolute;
      bottom: clamp(220px, 33vh, 320px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      pointer-events: all;
    }
    .cta-btns {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 16px;
      flex-wrap: nowrap;
    }
    .cta-btns > * {
      flex: 1 1 0;
      justify-content: center;
    }
    .cta-info {
      font-size: clamp(12px, 1.1vw, 15px);
      font-weight: 700;
      color: rgba(245,240,234,0.5);
      letter-spacing: 0.12em;
      white-space: nowrap;
    }
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--orange);
      color: #fff;
      font-family: inherit;
      font-size: clamp(15px, 1.6vw, 20px);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 18px 48px;
      border: none;
      border-radius: 999px;
      cursor: none;
      text-decoration: none;
      transition: background .18s, transform .18s, box-shadow .18s;
      box-shadow: 0 0 0 0 rgba(232,97,42,0);
      white-space: nowrap;
    }
    .cta-btn:hover {
      background: var(--orange-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(232,97,42,0.45);
    }
    .cta-btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #6b4226;
      color: #f0e8df;
      font-family: inherit;
      font-size: clamp(15px, 1.6vw, 20px);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 18px 48px;
      border: none;
      border-radius: 999px;
      cursor: none;
      text-decoration: none;
      transition: background .18s, transform .18s, box-shadow .18s;
      white-space: nowrap;
    }
    .cta-btn-secondary:hover {
      background: #7d5030;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(107,66,38,0.5);
    }
    .cta-meta {
      font-size: 12px;
      color: var(--gray);
      letter-spacing: 0.08em;
      text-align: left;
      line-height: 1.7;
    }

    /* ── AGENDA MODAL ──────────────────────────────────────── */
    .agenda-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(8, 5, 3, 0.72);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .28s ease;
    }
    .agenda-modal-overlay.show {
      opacity: 1;
      pointer-events: all;
    }
    .agenda-modal {
      background: #1c1510;
      border: 1px solid rgba(232,97,42,0.2);
      border-radius: 24px;
      padding: 48px 32px 36px;
      max-width: 460px;
      width: 92%;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(232,97,42,0.08);
      transform: translateY(24px) scale(0.96);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .28s ease;
      position: relative;
      max-height: 90vh;
      overflow-y: auto;
    }
    .agenda-modal-overlay.show .agenda-modal {
      transform: translateY(0) scale(1);
    }
    .agenda-modal-close {
      position: absolute;
      top: 16px; right: 20px;
      background: none;
      border: none;
      color: rgba(245,240,234,0.3);
      font-size: 22px;
      cursor: none;
      line-height: 1;
      transition: color .15s;
    }
    .agenda-modal-close:hover { color: rgba(245,240,234,0.7); }
    .agenda-modal-title {
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 900;
      font-size: clamp(20px, 2.4vw, 26px);
      color: var(--orange);
      text-align: center;
      margin-bottom: 32px;
      letter-spacing: 0.04em;
    }
    .agenda-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      text-align: left;
    }
    .agenda-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: rgba(232,97,42,0.07);
      border-radius: 14px;
      padding: 14px 18px;
    }
    .agenda-dot {
      width: 10px;
      height: 10px;
      background: var(--orange);
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
      opacity: 0.85;
    }
    .agenda-body {
      flex: 1;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .agenda-content {
      flex: 1;
    }
    .agenda-name {
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 700;
      font-size: clamp(14px, 1.5vw, 16px);
      color: var(--white);
      line-height: 1.5;
    }
    .agenda-desc {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: clamp(11px, 1.1vw, 13px);
      font-weight: normal;
      color: rgba(245,240,234,0.4);
      margin-top: 4px;
      line-height: 1.6;
    }
    .agenda-speakers {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      flex-shrink: 0;
    }
    .agenda-speaker {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: clamp(12px, 1.2vw, 14px);
      font-weight: 500;
      color: var(--orange);
      opacity: 0.85;
      white-space: nowrap;
    }

    /* ── MODAL ─────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(8, 5, 3, 0.72);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .28s ease;
    }
    .modal-overlay.show {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      background: #1c1510;
      border: 1px solid rgba(232,97,42,0.2);
      border-radius: 24px;
      padding: 48px 52px 40px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(232,97,42,0.08);
      transform: translateY(24px) scale(0.96);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .28s ease;
      position: relative;
    }
    .modal-overlay.show .modal {
      transform: translateY(0) scale(1);
    }
    .modal-icon {
      font-size: 48px;
      line-height: 1;
      margin-bottom: 18px;
    }
    .modal-title {
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 900;
      font-size: clamp(20px, 2.5vw, 26px);
      color: var(--orange);
      margin-bottom: 28px;
      letter-spacing: 0.04em;
    }
    .modal-info {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 36px;
    }
    .modal-info-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(232,97,42,0.07);
      border-radius: 12px;
      padding: 12px 20px;
    }
    .modal-info-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--orange);
      opacity: 0.8;
      width: 40px;
      flex-shrink: 0;
    }
    .modal-info-value {
      font-size: clamp(14px, 1.4vw, 16px);
      font-weight: 500;
      color: var(--white);
      letter-spacing: 0.06em;
    }
    .modal-confirm-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      background: var(--orange);
      color: #fff;
      font-family: inherit;
      font-size: clamp(15px, 1.5vw, 18px);
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 16px 0;
      border: none;
      border-radius: 999px;
      cursor: none;
      transition: background .18s, transform .18s, box-shadow .18s;
    }
    .modal-confirm-btn:hover {
      background: var(--orange-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(232,97,42,0.45);
    }
    .modal-close {
      position: absolute;
      top: 16px; right: 20px;
      background: none;
      border: none;
      color: rgba(245,240,234,0.3);
      font-size: 22px;
      cursor: none;
      line-height: 1;
      transition: color .15s;
    }
    .modal-close:hover { color: rgba(245,240,234,0.7); }

    /* ── BOTTOM STAGE (creatures peek from bottom) ─────────── */
    .stage {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: clamp(220px, 34vh, 340px);
      display: flex;
      justify-content: center;
      align-items: flex-end;
      z-index: 3;
      /* ground fade */
      background: linear-gradient(to bottom, transparent 0%, rgba(10,7,5,0.6) 60%, rgba(8,5,3,0.95) 100%);
    }

    /* ── CREATURE BASE STYLES ──────────────────────────────── */
    .creature-row {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 0;
      width: 100%;
      max-width: 1100px;
      padding: 0 10px;
      position: relative;
    }

    .creature {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      /* transform-origin at bottom center so tilt feels natural */
      transform-origin: bottom center;
      /* bob handled by JS, transition for smoothness */
      transition: transform 0.12s ease-out;
      will-change: transform;
    }

    @media (prefers-reduced-motion: reduce) {
      .creature { transition: none; }
    }

    /* SVG creatures are inline, sized via width attr */
  </style>
</head>
<body>

<!-- Custom cursor -->
<div id="cursor"></div>

<!-- Dot grid -->
<div class="dot-grid"></div>

<!-- Spotlight -->
<div class="spotlight" id="spotlight"></div>

<!-- Page -->
<div class="page">

  <!-- Nav -->
  <nav>
    <div class="nav-logo">UED Team</div>
  </nav>

  <!-- Hero -->
  <div class="hero">
    <h1 class="hero-title">
      点评UED<br>
      <span class="line2">AI at work 分享会</span>
    </h1>
  </div>

  <!-- CTA -->
  <div class="cta-bar">
    <a href="#" class="cta-btn" id="agendaBtn">
      查看分享会内容
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    </a>
    <p class="cta-info">4月15日（本周三）&nbsp;&nbsp;下午2:30~4:30&nbsp;&nbsp;德州厅</p>
  </div>

  <!-- Stage with creatures -->
  <div class="stage">
    <div class="creature-row" id="creatureRow">

      <!-- Creature 0 (NEW): chubby blue-gray, far far left, short peek -->
      <div class="creature" id="cr0" style="margin-bottom:-20px; margin-right:-14px; z-index:1;">
        <svg class="creature-svg" width="75" height="95" viewBox="0 0 75 95">
          <!-- stubby body -->
          <rect x="10" y="38" width="55" height="62" rx="27" fill="#2d3545"/>
          <!-- ears -->
          <polygon points="14,44 4,14 30,36" fill="#222a38"/>
          <polygon points="61,44 71,14 45,36" fill="#222a38"/>
          <!-- face -->
          <ellipse cx="37" cy="56" rx="24" ry="22" fill="#3d4a60"/>
          <!-- eye whites -->
          <ellipse class="eye-white-l" cx="27" cy="54" rx="8.5" ry="8.5" fill="#d8d0c4"/>
          <ellipse class="eye-white-r" cx="47" cy="54" rx="8.5" ry="8.5" fill="#d8d0c4"/>
          <!-- pupils -->
          <circle class="pupil-l" cx="27" cy="55" r="5" fill="#0e1520"/>
          <circle class="pupil-r" cx="47" cy="55" r="5" fill="#0e1520"/>
          <!-- shine -->
          <circle class="shine-l" cx="29" cy="52" r="1.8" fill="#fff" opacity="0.9"/>
          <circle class="shine-r" cx="49" cy="52" r="1.8" fill="#fff" opacity="0.9"/>

          <!-- nose -->
          <ellipse cx="37" cy="63" rx="2.5" ry="1.8" fill="#5a6a88" opacity="0.7"/>
        </svg>
      </div>

      <!-- Creature 1: tall dark cat, far left, peeking edge -->
      <div class="creature" id="cr1" style="margin-bottom:-10px; margin-right:-18px; z-index:2;">
        <svg class="creature-svg" width="90" height="200" viewBox="0 0 90 200">
          <rect x="20" y="60" width="50" height="145" rx="25" fill="#2a1f1a"/>
          <polygon points="22,68 10,30 38,55" fill="#1e1510"/>
          <polygon points="68,68 80,30 52,55" fill="#1e1510"/>
          <ellipse cx="45" cy="88" rx="26" ry="24" fill="#3a2820"/>
          <ellipse class="eye-white-l" cx="35" cy="86" rx="9" ry="9" fill="#d4c8b8"/>
          <ellipse class="eye-white-r" cx="55" cy="86" rx="9" ry="9" fill="#d4c8b8"/>
          <circle class="pupil-l" cx="35" cy="87" r="5.5" fill="#1a0d08"/>
          <circle class="pupil-r" cx="55" cy="87" r="5.5" fill="#1a0d08"/>
          <circle class="shine-l" cx="37" cy="84" r="2" fill="#fff" opacity="0.9"/>
          <circle class="shine-r" cx="57" cy="84" r="2" fill="#fff" opacity="0.9"/>

          <ellipse cx="45" cy="95" rx="3" ry="2" fill="#6b3a2a" opacity="0.7"/>
        </svg>
      </div>

      <!-- Creature 2: round orange face, front row left -->
      <div class="creature" id="cr2" style="margin-bottom:18px; z-index:5;">
        <svg class="creature-svg" width="110" height="72" viewBox="0 0 110 72">
          <ellipse cx="55" cy="45" rx="52" ry="34" fill="#c94a1a"/>
          <ellipse cx="20" cy="18" rx="10" ry="14" fill="#a03515"/>
          <ellipse cx="90" cy="18" rx="10" ry="14" fill="#a03515"/>
          <ellipse class="eye-white-l" cx="36" cy="44" rx="13" ry="12" fill="#e8ddd0"/>
          <ellipse class="eye-white-r" cx="74" cy="44" rx="13" ry="12" fill="#e8ddd0"/>
          <circle class="pupil-l" cx="36" cy="45" r="7" fill="#1a0d08"/>
          <circle class="pupil-r" cx="74" cy="45" r="7" fill="#1a0d08"/>
          <circle class="shine-l" cx="39" cy="41" r="2.5" fill="#fff" opacity="0.9"/>
          <circle class="shine-r" cx="77" cy="41" r="2.5" fill="#fff" opacity="0.9"/>

          <circle cx="55" cy="56" r="3" fill="#7a2a10" opacity="0.6"/>
        </svg>
      </div>

      <!-- Creature 3: green-yellow wide face, center-left -->
      <div class="creature" id="cr3" style="margin-bottom:30px; z-index:6;">
        <svg class="creature-svg" width="130" height="82" viewBox="0 0 130 82">
          <ellipse cx="65" cy="52" rx="62" ry="38" fill="#8a7218"/>
          <ellipse cx="22" cy="20" rx="12" ry="16" fill="#6b5610"/>
          <ellipse cx="108" cy="20" rx="12" ry="16" fill="#6b5610"/>
          <ellipse class="eye-white-l" cx="42" cy="51" rx="16" ry="15" fill="#e8ddd0"/>
          <ellipse class="eye-white-r" cx="88" cy="51" rx="16" ry="15" fill="#e8ddd0"/>
          <circle class="pupil-l" cx="42" cy="52" r="9" fill="#1a0d08"/>
          <circle class="pupil-r" cx="88" cy="52" r="9" fill="#1a0d08"/>
          <circle class="shine-l" cx="46" cy="47" r="3.5" fill="#fff" opacity="0.9"/>
          <circle class="shine-r" cx="92" cy="47" r="3.5" fill="#fff" opacity="0.9"/>
          <path class="bolt-l" d="M41 49 L38 54 L41 54 L38 59" stroke="#E8612A" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.85"/>
          <path class="bolt-r" d="M87 49 L84 54 L87 54 L84 59" stroke="#E8612A" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.85"/>

          <ellipse cx="65" cy="63" rx="4" ry="2.5" fill="#4a3008" opacity="0.5"/>
        </svg>
      </div>

      <!-- Creature 4: purple/pink center front -->
      <div class="creature" id="cr4" style="margin-bottom:10px; z-index:7; margin-left:-10px; margin-right:-10px;">
        <svg class="creature-svg" width="120" height="76" viewBox="0 0 120 76">
          <ellipse cx="60" cy="48" rx="57" ry="35" fill="#6b2a6e"/>
          <ellipse cx="18" cy="18" rx="11" ry="15" fill="#521e55"/>
          <ellipse cx="102" cy="18" rx="11" ry="15" fill="#521e55"/>
          <ellipse class="eye-white-l" cx="38" cy="47" rx="14" ry="14" fill="#e0d5c8"/>
          <ellipse class="eye-white-r" cx="82" cy="47" rx="14" ry="14" fill="#e0d5c8"/>
          <circle class="pupil-l" cx="38" cy="48" r="8" fill="#150d12"/>
          <circle class="pupil-r" cx="82" cy="48" r="8" fill="#150d12"/>

  <div class="modal">

<script>
// ═══════════════════════════════════════════════════════
//  MOUSE TRACKING  ·  EYES + BODY TILT
// ═══════════════════════════════════════════════════════

const cursor    = document.getElementById('cursor');
const spotlight = document.getElementById('spotlight');

// ── Custom cursor ────────────────────────────────────
document.addEventListener('mousemove', (e) => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
  spotlight.style.background =
    `radial-gradient(ellipse 55% 55% at ${e.clientX/window.innerWidth*100}% ${e.clientY/window.innerHeight*100}%, rgba(90,40,15,0.55) 0%, transparent 80%)`;
});

document.querySelectorAll('a, button, .cta-btn-secondary').forEach(el => {
  el.addEventListener('mouseenter', () => cursor.classList.add('big'));
  el.addEventListener('mouseleave', () => cursor.classList.remove('big'));
});

// ── Helpers ───────────────────────────────────────────
function getSVGPoint(svgEl, clientX, clientY) {
  const pt = svgEl.createSVGPoint();
  pt.x = clientX; pt.y = clientY;
  return pt.matrixTransform(svgEl.getScreenCTM().inverse());
}

function clampOffset(dx, dy, maxR) {
  const dist = Math.sqrt(dx*dx + dy*dy) || 0.001;
  const c = Math.min(dist, maxR);
  return { ox: dx/dist*c, oy: dy/dist*c };
}

function lerp(a, b, t) { return a + (b - a) * t; }

// ── Build eye trackers ────────────────────────────────
const trackers = [];
document.querySelectorAll('.creature-svg').forEach(svg => {
  const pl = svg.querySelector('.pupil-l');
  const pr = svg.querySelector('.pupil-r');
  const sl = svg.querySelector('.shine-l');
  const sr = svg.querySelector('.shine-r');
  const wl = svg.querySelector('.eye-white-l');
  const wr = svg.querySelector('.eye-white-r');
  if (!pl || !pr) return;
  const maxR = parseFloat(pl.getAttribute('r')) * 0.72;
  trackers.push({
    svg,
    l: { pupil:pl, shine:sl, white:wl,
         bx: parseFloat(pl.getAttribute('cx')), by: parseFloat(pl.getAttribute('cy')),
         sx: sl ? parseFloat(sl.getAttribute('cx')) : 0,
         sy: sl ? parseFloat(sl.getAttribute('cy')) : 0,
         baseR: parseFloat(pl.getAttribute('r')),
         whiteRx: wl ? parseFloat(wl.getAttribute('rx')) : 0,
         whiteRy: wl ? parseFloat(wl.getAttribute('ry')) : 0,
       },
    r: { pupil:pr, shine:sr, white:wr,
         bx: parseFloat(pr.getAttribute('cx')), by: parseFloat(pr.getAttribute('cy')),
         sx: sr ? parseFloat(sr.getAttribute('cx')) : 0,
         sy: sr ? parseFloat(sr.getAttribute('cy')) : 0,
         baseR: parseFloat(pr.getAttribute('r')),
         whiteRx: wr ? parseFloat(wr.getAttribute('rx')) : 0,
         whiteRy: wr ? parseFloat(wr.getAttribute('ry')) : 0,
       },
    maxR,
  });
});

// ── Build body tilt data ──────────────────────────────
// Each creature has: element, bobPhaseOffset, current/target tilt state
const creatures = [];
const MAX_TILT = 6;       // degrees max rotate
const MAX_TX   = 4;       // px horizontal lean
const BOB_AMP  = 6;       // px vertical bob amplitude
const BOB_SPD  = [2.8, 3.4, 2.6, 3.1, 2.9, 3.3, 2.7, 3.5, 2.5]; // per-creature speed

['cr0','cr1','cr2','cr3','cr4','cr5','cr6','cr7','cr8'].forEach((id, i) => {
  const el = document.getElementById(id);
  if (!el) return;
  const rect = el.getBoundingClientRect();
  creatures.push({
    el,
    idx: i,
    // center x of this creature on screen
    cx: rect.left + rect.width / 2,
    // bob state
    bobOffset: Math.random() * Math.PI * 2,
    bobSpd: BOB_SPD[i] || 3,
    // smooth tilt (current interpolated)
    curTilt: 0,
    curTx:   0,
    // target from mouse
    tgtTilt: 0,
    tgtTx:   0,
  });
});

// Rebuild cx on resize
window.addEventListener('resize', () => {
  creatures.forEach(c => {
    const rect = c.el.getBoundingClientRect();
    c.cx = rect.left + c.el.offsetWidth / 2;
  });
});

// ── State ────────────────────────────────────────────
let mx = window.innerWidth / 2;
let my = window.innerHeight / 2;
let rafId = null;
let lastTs = 0;

// ── Happy state ───────────────────────────────────────
let happyT = 0;
let happyCur = 0;
let happyBobTime = 0;  // independent fast-bob timer for happy state

document.getElementById('agendaBtn').addEventListener('mouseenter', () => { happyT = 1; });
document.getElementById('agendaBtn').addEventListener('mouseleave', () => { happyT = 0; });

// ── Main loop ─────────────────────────────────────────
function loop(ts) {
  rafId = requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  // Smooth happy value
  happyCur = lerp(happyCur, happyT, 1 - Math.pow(0.01, dt * 10));
  if (happyT === 1) happyBobTime += dt;
  else happyBobTime += dt * 0.3;

  // 1. Update eye tracking
  trackers.forEach((t) => {
    const mp = getSVGPoint(t.svg, mx, my);

    // Happy eyes: scale up eye whites and pupils by 20%
    const eyeScale = 1 + happyCur * 0.2;
    // Eye whites
    if (t.l.white) {
      t.l.white.setAttribute('rx', (t.l.whiteRx * eyeScale).toFixed(2));
      t.l.white.setAttribute('ry', (t.l.whiteRy * eyeScale).toFixed(2));
    }
    if (t.r.white) {
      t.r.white.setAttribute('rx', (t.r.whiteRx * eyeScale).toFixed(2));
      t.r.white.setAttribute('ry', (t.r.whiteRy * eyeScale).toFixed(2));
    }
    // Pupils: scale size
    const pR_l = t.l.baseR * eyeScale;
    const pR_r = t.r.baseR * eyeScale;
    t.l.pupil.setAttribute('r', pR_l.toFixed(2));
    t.r.pupil.setAttribute('r', pR_r.toFixed(2));

    const lo = clampOffset(mp.x - t.l.bx, mp.y - t.l.by, t.maxR);
    t.l.pupil.setAttribute('cx', t.l.bx + lo.ox);
    t.l.pupil.setAttribute('cy', t.l.by + lo.oy);
    if (t.l.shine) {
      t.l.shine.setAttribute('cx', t.l.sx + lo.ox);
      t.l.shine.setAttribute('cy', t.l.sy + lo.oy);
    }

    const ro = clampOffset(mp.x - t.r.bx, mp.y - t.r.by, t.maxR);
    t.r.pupil.setAttribute('cx', t.r.bx + ro.ox);
    t.r.pupil.setAttribute('cy', t.r.by + ro.oy);
    if (t.r.shine) {
      t.r.shine.setAttribute('cx', t.r.sx + ro.ox);
      t.r.shine.setAttribute('cy', t.r.sy + ro.oy);
    }
  });

  // 2. Update body tilt + bob
  const W = window.innerWidth;
  const H = window.innerHeight;
  // mouse normalized -1..1
  const mnx = (mx / W) * 2 - 1;  // -1 = left, +1 = right
  const mny = (my / H) * 2 - 1;  // -1 = top,  +1 = bottom

  creatures.forEach(c => {
    // Tilt: creature leans toward mouse relative to its own position
    const relX = mx - c.cx; // positive = mouse is to the right of this creature
    const normRelX = Math.max(-1, Math.min(1, relX / (W * 0.45)));
    c.tgtTilt = normRelX * MAX_TILT;
    c.tgtTx   = normRelX * MAX_TX;

    // Smooth toward target (faster response ~12 frames at 60fps)
    const alpha = 1 - Math.pow(0.05, dt * 8);
    c.curTilt = lerp(c.curTilt, c.tgtTilt, alpha);
    c.curTx   = lerp(c.curTx,   c.tgtTx,   alpha);

    // Bob: normal lazy bob + fast happy bounce blended
    c.bobOffset += dt * c.bobSpd;
    const normalBob = -Math.abs(Math.sin(c.bobOffset)) * BOB_AMP;

    // Happy bounce: fast, higher amplitude, each creature slightly offset in phase
    const happyPhase = happyBobTime * 7 + c.idx * 0.6;
    const happyBob = -Math.abs(Math.sin(happyPhase)) * 20;

    const bobY = lerp(normalBob, happyBob, happyCur);

    // Combine
    c.el.style.transform =
      `translateX(${c.curTx.toFixed(2)}px) translateY(${bobY.toFixed(2)}px) rotate(${c.curTilt.toFixed(2)}deg) scale(${(1 + happyCur * 0.04).toFixed(3)})`;
  });
}

document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
document.addEventListener('touchmove', e => {
  mx = e.touches[0].clientX; my = e.touches[0].clientY;
}, { passive: true });

// kick off
requestAnimationFrame(ts => { lastTs = ts; requestAnimationFrame(loop); });

// ── Agenda Modal ──────────────────────────────────────
const agendaModalOverlay = document.getElementById('agendaModalOverlay');
const agendaModalClose   = document.getElementById('agendaModalClose');
const agendaModalConfirm = document.getElementById('agendaModalConfirm');
const agendaBtn           = document.getElementById('agendaBtn');

function openAgendaModal()  { agendaModalOverlay.classList.add('show'); }
function closeAgendaModal() { agendaModalOverlay.classList.remove('show'); }

agendaBtn.addEventListener('click', e => { e.preventDefault(); openAgendaModal(); });
agendaModalClose.addEventListener('click', closeAgendaModal);
agendaModalConfirm.addEventListener('click', closeAgendaModal);
agendaModalOverlay.addEventListener('click', e => { if (e.target === agendaModalOverlay) closeAgendaModal(); });

[agendaModalClose, agendaModalConfirm].forEach(el => {
  el.addEventListener('mouseenter', () => cursor.classList.add('big'));
  el.addEventListener('mouseleave', () => cursor.classList.remove('big'));
});

// ── Modal (报名弹窗已移除) ──────────────────────────
const modalOverlay  = document.getElementById('modalOverlay');
const modalClose    = document.getElementById('modalClose');
const modalConfirm  = document.getElementById('modalConfirm');

function openModal()  { modalOverlay.classList.add('show'); }
function closeModal() { modalOverlay.classList.remove('show'); }

modalClose.addEventListener('click', closeModal);
modalConfirm.addEventListener('click', closeModal);
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });

// cursor big on modal buttons
[modalClose, modalConfirm].forEach(el => {
  el.addEventListener('mouseenter', () => cursor.classList.add('big'));
  el.addEventListener('mouseleave', () => cursor.classList.remove('big'));
});
</script>
